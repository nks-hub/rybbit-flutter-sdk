name: rybbit_flutter
description: Flutter SDK for Rybbit Analytics. Track screen views, events, errors, and user identification.
version: 0.2.0
homepage: https://github.com/nks-hub/rybbit-flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.0
  hive: ^2.2.3
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
